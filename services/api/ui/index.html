<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Sovereign Node</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --gb-dark:   #282828;
      --gb-dark2:  #3c3836;
      --gb-accent: #32302f;
      --gb-light:  #ebdbb2;
      --gb-blue:   #458588;
      --gb-green:  #b8bb26;
      --gb-red:    #fb4934;
      --gb-orange: #d65d0e;
      --gb-purple: #d3869b;
      --gb-gray:   #928374;
      --font-mono: 'Roboto Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--gb-dark);
      color: var(--gb-light);
      font-family: var(--font-mono);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--gb-dark2);
      border-bottom: 1px solid var(--gb-accent);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo { font-size: 13px; font-weight: 700; color: var(--gb-orange); letter-spacing: 0.05em; text-transform: uppercase; flex: 1; }
    .logo span { color: var(--gb-gray); font-weight: 400; }
    .toggles { display: flex; gap: 8px; }
    .toggle { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--gb-gray); background: transparent; color: var(--gb-gray); cursor: pointer; transition: all 0.15s; }
    .toggle.active-rag { border-color: var(--gb-green); color: var(--gb-green); }
    .toggle.active-web { border-color: var(--gb-blue); color: var(--gb-blue); }
    .toggle:hover { opacity: 0.85; }

    /* ── Collapse toggle button ── */
    .btn-collapse-drawer {
      font-family: var(--font-mono);
      font-size: 13px;
      background: none;
      border: 1px solid var(--gb-gray);
      color: var(--gb-gray);
      border-radius: 3px;
      padding: 3px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-collapse-drawer:hover { border-color: var(--gb-light); color: var(--gb-light); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--gb-accent);
      border-right: 1px solid var(--gb-dark2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #new-chat {
      margin: 10px;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--gb-orange);
      color: var(--gb-orange);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 3px;
      cursor: pointer;
      text-align: left;
      transition: opacity 0.15s;
    }
    #new-chat:hover { opacity: 0.75; }
    #conv-list { flex: 1; overflow-y: auto; padding: 0 6px 10px; }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-thumb { background: var(--gb-dark2); border-radius: 2px; }
    .conv-group-label { font-size: 9px; color: var(--gb-gray); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 6px 4px; }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .conv-item:hover { background: var(--gb-dark2); }
    .conv-item.active { background: var(--gb-dark2); border-left: 2px solid var(--gb-orange); padding-left: 6px; }
    .conv-title { font-size: 11px; color: var(--gb-light); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-del { font-size: 11px; color: var(--gb-gray); background: none; border: none; cursor: pointer; padding: 0 2px; display: none; line-height: 1; }
    .conv-item:hover .conv-del { display: block; }
    .conv-del:hover { color: var(--gb-red); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Chat ── */
    #chat { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: var(--gb-dark); }
    #chat::-webkit-scrollbar-thumb { background: var(--gb-dark2); border-radius: 3px; }

    .msg { display: flex; flex-direction: column; max-width: 78%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 12px 16px; border-radius: 6px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: var(--gb-dark2); color: var(--gb-light); border: 1px solid var(--gb-accent); }
    .msg.bot  .bubble { background: var(--gb-accent); color: var(--gb-light); border: 1px solid var(--gb-dark2); white-space: normal; }
    .msg.bot .bubble p  { margin: 0 0 0.6em; }
    .msg.bot .bubble p:last-child { margin-bottom: 0; }
    .msg.bot .bubble ul, .msg.bot .bubble ol { margin: 0.4em 0 0.6em 1.4em; }
    .msg.bot .bubble li { margin-bottom: 0.2em; }
    .msg.bot .bubble code { background: var(--gb-dark); color: var(--gb-green); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .msg.bot .bubble pre { background: var(--gb-dark); border: 1px solid var(--gb-dark2); border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 0.6em 0; }
    .msg.bot .bubble pre code { background: none; padding: 0; color: var(--gb-light); font-size: 12px; }
    .msg.bot .bubble h1,.msg.bot .bubble h2,.msg.bot .bubble h3 { color: var(--gb-orange); margin: 0.6em 0 0.3em; font-size: 13px; }
    .msg.bot .bubble strong { color: var(--gb-orange); }
    .msg.bot .bubble em { color: var(--gb-purple); }
    .msg.bot .bubble a { color: var(--gb-blue); }
    .msg.bot .bubble blockquote { border-left: 2px solid var(--gb-gray); margin: 0.4em 0; padding-left: 10px; color: var(--gb-gray); }
    .meta { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .latency { font-size: 10px; color: var(--gb-gray); }
    .source { font-size: 10px; color: var(--gb-purple); background: var(--gb-dark2); border: 1px solid var(--gb-purple); border-radius: 3px; padding: 2px 6px; text-decoration: none; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
    .source:hover { opacity: 0.75; }
    .thinking .bubble { color: var(--gb-orange); border-color: var(--gb-orange); }
    .dots::after { content: ''; animation: dots 1.2s steps(3, end) infinite; }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } 100% { content: ''; } }
    .error .bubble { color: var(--gb-red); border-color: var(--gb-red); background: var(--gb-dark); }

    /* ── Empty state ── */
    .empty { margin: auto; text-align: center; color: var(--gb-gray); }
    .empty .prompt { font-size: 22px; margin-bottom: 10px; color: var(--gb-orange); }
    .empty p { font-size: 12px; line-height: 1.8; margin-bottom: 16px; }
    .empty code { color: var(--gb-green); background: var(--gb-dark2); padding: 1px 5px; border-radius: 3px; }
    .empty-toggles { display: flex; gap: 12px; justify-content: center; }
    .empty-toggles .toggle { font-size: 13px; padding: 8px 20px; }
    .empty-toggles .toggle span { font-size: 10px; opacity: 0.6; margin-left: 6px; font-weight: 400; letter-spacing: 0; }

    /* ── Input bar ── */
    footer { background: var(--gb-dark2); border-top: 1px solid var(--gb-accent); padding: 12px 20px; display: flex; gap: 10px; flex-shrink: 0; align-items: flex-end; }
    #input { flex: 1; background: var(--gb-dark); color: var(--gb-light); font-family: var(--font-mono); font-size: 13px; border: 1px solid var(--gb-accent); border-radius: 4px; padding: 10px 14px; outline: none; resize: none; line-height: 1.5; min-height: 42px; max-height: 120px; overflow-y: auto; transition: border-color 0.15s; }
    #input:focus { border-color: var(--gb-blue); }
    #input::placeholder { color: var(--gb-gray); }
    #send { background: var(--gb-blue); color: var(--gb-dark); font-family: var(--font-mono); font-size: 13px; font-weight: 700; border: none; border-radius: 4px; padding: 0 18px; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0; }
    #send:hover { opacity: 0.85; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Right drawer ── */
    #right-drawer {
      width: 260px;
      flex-shrink: 0;
      background: var(--gb-accent);
      border-left: 1px solid var(--gb-dark2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s ease;
    }
    #right-drawer.collapsed { width: 0; border: none; }

    /* ── Drawer sections ── */
    .drawer-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      border-bottom: 1px solid var(--gb-dark2);
    }
    .drawer-section:last-child { border-bottom: none; }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--gb-dark2);
      flex-shrink: 0;
    }
    .drawer-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .drawer-title.cal  { color: var(--gb-blue); }
    .drawer-title.rem  { color: var(--gb-green); }
    .btn-expand {
      font-family: var(--font-mono);
      font-size: 11px;
      background: none;
      border: 1px solid var(--gb-gray);
      color: var(--gb-gray);
      border-radius: 3px;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-expand:hover { border-color: var(--gb-light); color: var(--gb-light); }
    .btn-collapse {
      font-family: var(--font-mono);
      font-size: 11px;
      background: none;
      border: none;
      color: var(--gb-gray);
      padding: 0 4px 0 0;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-collapse:hover { color: var(--gb-light); }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .drawer-body::-webkit-scrollbar { width: 3px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--gb-dark2); }

    /* ── Compact reminder item in drawer ── */
    .dr-remind-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 8px;
      background: var(--gb-dark);
      border-radius: 3px;
      border-left: 2px solid var(--gb-green);
    }
    .dr-remind-text { font-size: 11px; color: var(--gb-light); line-height: 1.3; }
    .dr-remind-meta { font-size: 10px; color: var(--gb-gray); }
    .drawer-empty { font-size: 11px; color: var(--gb-gray); padding: 4px 0; text-align: center; }

    /* ── Compact calendar placeholder in drawer ── */
    .cal-mini-placeholder {
      font-size: 11px;
      color: var(--gb-gray);
      text-align: center;
      padding: 12px 6px;
      line-height: 1.7;
    }
    .cal-mini-badge {
      font-size: 10px;
      border: 1px solid var(--gb-blue);
      color: var(--gb-blue);
      border-radius: 3px;
      padding: 1px 5px;
      display: inline-block;
      margin: 2px 3px;
    }

    /* ── Briefing banner ── */
    #briefing-body h2 { color: var(--gb-orange); font-size: 11px; font-weight: 700; margin: 0 0 4px; }
    #briefing-body strong { color: var(--gb-orange); }
    #briefing-body ul, #briefing-body ol { margin: 2px 0 4px 14px; }
    #briefing-body li { margin-bottom: 2px; }
    #briefing-body p { margin: 0 0 4px; }

    /* ── Reminders (modal body reuse) ── */
    .remind-form {
      background: var(--gb-accent);
      border: 1px solid var(--gb-dark2);
      border-radius: 4px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .remind-form-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gb-green);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .remind-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .remind-input {
      flex: 1;
      min-width: 180px;
      background: var(--gb-dark);
      color: var(--gb-light);
      font-family: var(--font-mono);
      font-size: 13px;
      border: 1px solid var(--gb-accent);
      border-radius: 4px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .remind-input:focus { border-color: var(--gb-green); }
    .remind-input::placeholder { color: var(--gb-gray); }
    .remind-select {
      background: var(--gb-dark);
      color: var(--gb-light);
      font-family: var(--font-mono);
      font-size: 12px;
      border: 1px solid var(--gb-accent);
      border-radius: 4px;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
    }
    .remind-select:focus { border-color: var(--gb-green); }
    .btn-add-remind {
      background: var(--gb-green);
      color: var(--gb-dark);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 4px;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .btn-add-remind:hover { opacity: 0.85; }
    .remind-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gb-gray);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .remind-count {
      font-size: 10px;
      color: var(--gb-green);
      background: var(--gb-dark2);
      border-radius: 10px;
      padding: 1px 7px;
    }
    .remind-list { display: flex; flex-direction: column; gap: 6px; }
    .remind-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--gb-accent);
      border: 1px solid var(--gb-dark2);
      border-radius: 4px;
      padding: 10px 14px;
      transition: opacity 0.15s;
    }
    .remind-item.done { opacity: 0.4; }
    .remind-item-text { flex: 1; font-size: 13px; color: var(--gb-light); }
    .remind-item-time { font-size: 10px; color: var(--gb-gray); white-space: nowrap; }
    .remind-item-recur {
      font-size: 10px;
      color: var(--gb-blue);
      background: var(--gb-dark2);
      border-radius: 3px;
      padding: 1px 6px;
    }
    .btn-done {
      background: none;
      border: 1px solid var(--gb-gray);
      color: var(--gb-gray);
      font-family: var(--font-mono);
      font-size: 11px;
      border-radius: 3px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-done:hover { border-color: var(--gb-green); color: var(--gb-green); }
    .remind-empty { font-size: 12px; color: var(--gb-gray); padding: 12px 0; }
    .show-completed-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gb-gray);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .show-completed-btn:hover { color: var(--gb-light); }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--gb-dark2);
      border: 1px solid var(--gb-accent);
      border-radius: 6px;
      width: min(600px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--gb-accent);
      flex-shrink: 0;
    }
    .modal-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .modal-title.cal { color: var(--gb-blue); }
    .modal-title.rem { color: var(--gb-green); }
    .btn-close-modal {
      font-family: var(--font-mono);
      font-size: 16px;
      background: none;
      border: none;
      color: var(--gb-gray);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .btn-close-modal:hover { color: var(--gb-red); }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Calendar multi-view modal ── */
    #modal-cal .modal-box { width: min(920px, 98vw); max-height: 92vh; }
    .cal-view-tabs { display: flex; gap: 2px; }
    .cal-tab {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      background: none; border: 1px solid var(--gb-accent); border-radius: 3px;
      color: var(--gb-gray); padding: 2px 8px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .cal-tab.active { background: var(--gb-blue); border-color: var(--gb-blue); color: var(--gb-dark0); }
    .cal-tab:hover:not(.active) { color: var(--gb-blue); border-color: var(--gb-blue); }
    .cal-nav { display: flex; gap: 3px; align-items: center; }
    .cal-nav-btn {
      font-family: var(--font-mono); font-size: 12px; background: none;
      border: 1px solid var(--gb-accent); border-radius: 3px; color: var(--gb-light);
      padding: 1px 8px; cursor: pointer; line-height: 1.6;
    }
    .cal-nav-btn:hover { border-color: var(--gb-blue); color: var(--gb-blue); }
    .cal-period-label { font-size: 11px; color: var(--gb-yellow); font-weight: 700; min-width: 0; }

    /* Month grid */
    .month-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 1px; background: var(--gb-dark1);
    }
    .month-day-header {
      background: var(--gb-dark2); padding: 5px 4px; text-align: center;
      font-size: 10px; font-weight: 700; color: var(--gb-gray);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .month-day-cell {
      background: var(--gb-dark0); min-height: 88px; padding: 4px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .month-day-cell.empty { background: var(--gb-dark2); opacity: 0.4; }
    .month-day-cell.today { outline: 1px solid var(--gb-blue); outline-offset: -1px; }
    .month-date-num {
      font-size: 11px; font-weight: 700; color: var(--gb-gray);
      width: 20px; height: 20px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; flex-shrink: 0;
    }
    .month-date-num.today { background: var(--gb-blue); color: var(--gb-dark0); }
    .month-event {
      font-size: 10px; border-radius: 2px; padding: 1px 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; gap: 3px; align-items: center; color: var(--gb-light);
    }
    .month-event-time { color: var(--gb-gray); flex-shrink: 0; font-size: 9px; }
    .month-event-title { overflow: hidden; text-overflow: ellipsis; }
    .month-more { font-size: 9px; color: var(--gb-gray); padding: 0 4px; }

    /* Week grid */
    .week-header-row {
      display: flex; border-bottom: 1px solid var(--gb-dark1); flex-shrink: 0;
    }
    .week-time-pad { width: 42px; flex-shrink: 0; }
    .week-day-headers { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; }
    .week-day-hdr {
      padding: 5px 4px; text-align: center; font-size: 10px;
      color: var(--gb-gray); border-left: 1px solid var(--gb-dark1);
    }
    .week-day-hdr.today { color: var(--gb-blue); font-weight: 700; }
    .week-grid-scroll { overflow-y: auto; flex: 1; }
    .week-grid-inner { display: flex; }
    .week-time-gutter { width: 42px; flex-shrink: 0; }
    .week-hour-label {
      height: 44px; font-size: 9px; color: var(--gb-gray);
      text-align: right; padding-right: 5px; padding-top: 2px;
      border-top: 1px solid var(--gb-dark1); box-sizing: border-box;
    }
    .week-day-cols { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; }
    .week-day-col { position: relative; border-left: 1px solid var(--gb-dark1); }
    .week-hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid var(--gb-dark1); pointer-events: none; }
    .now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--gb-red); z-index: 2; pointer-events: none; }
    .week-event {
      position: absolute; left: 2px; right: 2px; border-radius: 3px;
      font-size: 10px; padding: 2px 4px; overflow: hidden;
      display: flex; flex-direction: column; box-sizing: border-box;
      color: var(--gb-light);
    }
    .week-event-time { font-size: 9px; opacity: 0.75; white-space: nowrap; }
    .week-event-title { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Day view */
    .day-view { display: flex; flex-direction: column; }
    .day-event-row {
      display: flex; gap: 10px; padding: 9px 16px;
      border-bottom: 1px solid var(--gb-dark1); align-items: flex-start;
    }
    .day-event-time { font-size: 11px; color: var(--gb-gray); width: 100px; flex-shrink: 0; line-height: 1.5; }
    .day-event-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .day-event-title { font-size: 12px; color: var(--gb-light); }
    .day-event-desc { font-size: 11px; color: var(--gb-gray); margin-top: 3px; line-height: 1.5; }

    /* ── Calendar modal body ── */
    .cal-modal-placeholder {
      text-align: center;
      color: var(--gb-gray);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 0;
    }
    .cal-modal-title { font-size: 13px; font-weight: 700; color: var(--gb-blue); letter-spacing: 0.05em; text-transform: uppercase; }
    .cal-modal-body { font-size: 12px; line-height: 1.9; }
    .cal-badge { font-size: 11px; border: 1px solid var(--gb-blue); color: var(--gb-blue); border-radius: 3px; padding: 2px 8px; display: inline-block; margin: 2px 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Pi Sovereign Node <span>// local assistant</span></div>
  <button class="btn-collapse-drawer" id="btn-collapse-drawer" title="Toggle panel">&#9616;</button>
</header>

<div class="layout">
  <nav id="sidebar">
    <button id="new-chat">+ new chat</button>
    <div id="conv-list"></div>
  </nav>

  <div class="main">
    <div id="chat">
      <div class="empty" id="empty">
        <div class="prompt">></div>
        <p>Ask anything from your vault.</p>
        <div class="empty-toggles">
          <button class="toggle active-rag" id="btn-rag-hero">RAG <span>search notes</span></button>
          <button class="toggle" id="btn-web-hero">WEB <span>search web</span></button>
        </div>
      </div>
    </div>
    <footer>
      <div class="toggles">
        <button class="toggle active-rag" id="btn-rag" title="Toggle RAG">RAG</button>
        <button class="toggle" id="btn-web" title="Toggle web search">WEB</button>
      </div>
      <textarea id="input" rows="1" placeholder="ask something..."></textarea>
      <button id="send">send</button>
    </footer>
  </div>

  <aside id="right-drawer">

    <div id="briefing-banner" style="display:none; flex-shrink:0; border-bottom: 1px solid var(--gb-dark2);">
      <div class="drawer-header">
        <button class="btn-collapse" data-target="briefing-body">&#9662;</button>
        <span class="drawer-title" style="color:var(--gb-orange);" id="briefing-date-title">briefing</span>
      </div>
      <div id="briefing-body" class="drawer-body" style="font-size:11px; line-height:1.7; color:var(--gb-light); max-height:180px; overflow-y:auto;"></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-header">
        <button class="btn-collapse" data-target="cal-drawer-body">&#9662;</button>
        <span class="drawer-title cal">calendar</span>
        <button class="btn-expand" id="btn-expand-cal">&#8599;</button>
      </div>
      <div class="drawer-body" id="cal-drawer-body">
        <div id="cal-events-mini"></div>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-header">
        <button class="btn-collapse" data-target="rem-drawer-body">&#9662;</button>
        <span class="drawer-title rem">reminders <span id="drawer-remind-count" style="font-size:9px;color:var(--gb-green);margin-left:4px;"></span></span>
        <button class="btn-expand" id="btn-expand-rem">&#8599;</button>
      </div>
      <div class="drawer-body" id="rem-drawer-body">
      </div>
    </div>

  </aside>
</div>

<!-- Calendar modal -->
<div class="modal-overlay" id="modal-cal">
  <div class="modal-box">
    <div class="modal-header" style="gap:10px; flex-wrap:wrap;">
      <span class="cal-period-label" id="cal-period-label">calendar</span>
      <div class="cal-view-tabs">
        <button class="cal-tab active" data-view="month">month</button>
        <button class="cal-tab" data-view="week">week</button>
        <button class="cal-tab" data-view="day">day</button>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
        <button class="cal-nav-btn" id="cal-today-btn">today</button>
        <button class="cal-nav-btn" id="cal-next">&#8250;</button>
      </div>
      <button class="btn-close-modal" id="close-modal-cal" style="margin-left:auto;">&times;</button>
    </div>
    <div id="cal-view-area" style="flex:1; overflow:hidden; display:flex; flex-direction:column;"></div>
    <div id="cal-modal-auth" style="display:none; padding:8px 18px; font-size:12px; color:var(--gb-gray); flex-shrink:0; border-top:1px solid var(--gb-accent);">
      <a id="cal-auth-link" href="/calendar/auth" style="color:var(--gb-blue);">Connect Google Calendar</a>
      — visit the link, approve, and reload.
    </div>
  </div>
</div>

<!-- Reminders modal -->
<div class="modal-overlay" id="modal-rem">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title rem">reminders</span>
      <button class="btn-close-modal" id="close-modal-rem">&times;</button>
    </div>
    <div class="modal-body" id="modal-rem-body">

      <div class="remind-form">
        <div class="remind-form-title">+ new reminder</div>
        <div class="remind-row">
          <input id="remind-text" class="remind-input" type="text" placeholder="what to remind you about..." />
          <input id="remind-at" class="remind-input" type="datetime-local" style="flex:0; min-width:190px;" />
          <select id="remind-recur" class="remind-select">
            <option value="">once</option>
            <option value="daily">daily</option>
            <option value="weekly">weekly</option>
          </select>
          <button class="btn-add-remind" id="btn-add-remind">add</button>
        </div>
      </div>

      <div>
        <div class="remind-section-title">
          pending <span class="remind-count" id="remind-pending-count">0</span>
        </div>
        <div class="remind-list" id="remind-pending-list"></div>
      </div>

      <div>
        <button class="show-completed-btn" id="show-completed-btn">show completed</button>
        <div id="completed-section" style="display:none; margin-top:10px;">
          <div class="remind-section-title">completed</div>
          <div class="remind-list" id="remind-completed-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const empty   = document.getElementById('empty');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const btnRag     = document.getElementById('btn-rag');
  const btnWeb     = document.getElementById('btn-web');
  const btnRagHero = document.getElementById('btn-rag-hero');
  const btnWebHero = document.getElementById('btn-web-hero');
  const convList   = document.getElementById('conv-list');

  let useRag = true;
  let useWeb = false;
  let currentConvId = null;

  // ── Toggles ──
  function syncToggles() {
    btnRag.classList.toggle('active-rag', useRag);
    btnRagHero.classList.toggle('active-rag', useRag);
    btnWeb.classList.toggle('active-web', useWeb);
    btnWebHero.classList.toggle('active-web', useWeb);
  }
  btnRag.addEventListener('click',     () => { useRag = !useRag; syncToggles(); });
  btnRagHero.addEventListener('click', () => { useRag = !useRag; syncToggles(); });
  btnWeb.addEventListener('click',     () => { useWeb = !useWeb; syncToggles(); });
  btnWebHero.addEventListener('click', () => { useWeb = !useWeb; syncToggles(); });

  // ── Auto-resize textarea ──
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.addEventListener('click', send);

  // ── New chat ──
  document.getElementById('new-chat').addEventListener('click', () => {
    currentConvId = null;
    chat.innerHTML = '';
    chat.appendChild(empty);
    empty.style.display = '';
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    input.focus();
  });

  // ── Load sidebar ──
  async function loadConversations() {
    const res = await fetch('/conversations');
    if (!res.ok) return;
    const convs = await res.json();
    renderSidebar(convs);
  }

  function groupConversations(convs) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const week = new Date(today); week.setDate(today.getDate() - 7);

    const groups = { Today: [], Yesterday: [], 'This week': [], Older: [] };
    for (const c of convs) {
      const d = new Date(c.updated_at);
      if (d >= today) groups['Today'].push(c);
      else if (d >= yesterday) groups['Yesterday'].push(c);
      else if (d >= week) groups['This week'].push(c);
      else groups['Older'].push(c);
    }
    return groups;
  }

  function renderSidebar(convs) {
    convList.innerHTML = '';
    const groups = groupConversations(convs);
    for (const [label, items] of Object.entries(groups)) {
      if (!items.length) continue;
      const lbl = document.createElement('div');
      lbl.className = 'conv-group-label';
      lbl.textContent = label;
      convList.appendChild(lbl);
      for (const c of items) {
        const item = document.createElement('div');
        item.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
        item.dataset.id = c.id;

        const title = document.createElement('span');
        title.className = 'conv-title';
        title.textContent = c.title;

        const del = document.createElement('button');
        del.className = 'conv-del';
        del.textContent = '×';
        del.title = 'Delete';
        del.addEventListener('click', async e => {
          e.stopPropagation();
          await fetch(`/conversations/${c.id}`, { method: 'DELETE' });
          if (currentConvId === c.id) {
            currentConvId = null;
            chat.innerHTML = '';
            chat.appendChild(empty);
            empty.style.display = '';
          }
          loadConversations();
        });

        item.appendChild(title);
        item.appendChild(del);
        item.addEventListener('click', () => loadConversation(c.id));
        convList.appendChild(item);
      }
    }
  }

  async function loadConversation(id) {
    const res = await fetch(`/conversations/${id}`);
    if (!res.ok) return;
    const data = await res.json();
    currentConvId = id;

    chat.innerHTML = '';
    empty.style.display = 'none';
    chat.appendChild(empty);

    for (const msg of data.messages) {
      if (msg.role === 'user') {
        addMsg('user', msg.content);
      } else {
        addMsg('bot', msg.content, { latency: msg.latency_ms, sources: msg.sources });
      }
    }
    chat.scrollTop = chat.scrollHeight;

    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.id) === id);
    });
    input.focus();
  }

  // ── Render helpers ──
  function addMsg(role, text, meta = {}) {
    empty.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'bot') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }
    wrap.appendChild(bubble);

    if (meta.latency != null || (meta.sources && meta.sources.length)) {
      const m = document.createElement('div');
      m.className = 'meta';
      if (meta.latency != null) {
        const lat = document.createElement('span');
        lat.className = 'latency';
        lat.textContent = `${(meta.latency / 1000).toFixed(1)}s`;
        m.appendChild(lat);
      }
      (meta.sources || []).forEach(src => {
        const a = document.createElement('a');
        a.className = 'source';
        a.textContent = src;
        if (src.startsWith('http')) { a.href = src; a.target = '_blank'; a.rel = 'noopener'; }
        else { a.href = '#'; a.title = src; }
        m.appendChild(a);
      });
      wrap.appendChild(m);
    }
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addThinking() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot thinking';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = 'thinking<span class="dots"></span>';
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  // ── Send ──
  async function send() {
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    const thinking = addThinking();

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 180000);
      const res = await fetch('/ask/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, use_rag: useRag, use_web: useWeb, conversation_id: currentConvId }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);

      if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);

      thinking.remove();
      const botWrap = document.createElement('div');
      botWrap.className = 'msg bot';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      botWrap.appendChild(bubble);
      chat.appendChild(botWrap);
      const meta = document.createElement('div');
      meta.className = 'meta';
      botWrap.appendChild(meta);

      let sources = [];
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const ev = JSON.parse(line.slice(6));

          if (ev.type === 'token') {
            bubble.dataset.raw = (bubble.dataset.raw || '') + ev.token;
            bubble.textContent = bubble.dataset.raw;
            chat.scrollTop = chat.scrollHeight;
          } else if (ev.type === 'sources') {
            sources = ev.sources || [];
          } else if (ev.type === 'done') {
            // Render accumulated raw text as markdown
            if (bubble.dataset.raw) bubble.innerHTML = marked.parse(bubble.dataset.raw);
            if (ev.conversation_id && ev.conversation_id !== currentConvId) {
              currentConvId = ev.conversation_id;
              loadConversations();
            } else if (ev.conversation_id) {
              loadConversations();
            }
            const lat = document.createElement('span');
            lat.className = 'latency';
            lat.textContent = `${(ev.latency_ms / 1000).toFixed(1)}s`;
            meta.appendChild(lat);
            sources.forEach(src => {
              const a = document.createElement('a');
              a.className = 'source';
              a.textContent = src;
              if (src.startsWith('http')) { a.href = src; a.target = '_blank'; a.rel = 'noopener'; }
              else { a.href = '#'; a.title = src; }
              meta.appendChild(a);
            });
            loadReminders();
          }
        }
      }
    } catch (err) {
      thinking.remove();
      const msg = err.name === 'AbortError'
        ? 'Request timed out — the model may be busy. Try a shorter message.'
        : `error: ${err.message}`;
      const wrap = addMsg('bot', msg);
      wrap.classList.add('error');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Drawer collapse ──
  const btnCollapseDrawer = document.getElementById('btn-collapse-drawer');
  const rightDrawer = document.getElementById('right-drawer');
  btnCollapseDrawer.addEventListener('click', () => {
    rightDrawer.classList.toggle('collapsed');
  });

  // ── Modal helpers ──
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.getElementById('btn-expand-cal').addEventListener('click', () => openModal('modal-cal'));
  document.getElementById('close-modal-cal').addEventListener('click', () => closeModal('modal-cal'));

  document.getElementById('btn-expand-rem').addEventListener('click', () => {
    openModal('modal-rem');
    loadReminders();
  });
  document.getElementById('close-modal-rem').addEventListener('click', () => closeModal('modal-rem'));

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  });

  // ── Reminders: drawer (compact) + modal (full) ──
  async function loadReminders() {
    const [pendingRes, doneRes] = await Promise.all([
      fetch('/reminders?done=false'),
      fetch('/reminders?done=true'),
    ]);
    const pending   = pendingRes.ok ? await pendingRes.json() : [];
    const completed = doneRes.ok   ? await doneRes.json()   : [];

    renderDrawerReminders(pending);

    document.getElementById('remind-pending-count').textContent = pending.length;
    renderReminderList('remind-pending-list', pending, false);
    renderReminderList('remind-completed-list', completed, true);
  }

  function formatReminderTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = d - now;
    if (diff > 0 && diff < 60000)   return 'in <1 min';
    if (diff > 0 && diff < 3600000) return `in ${Math.round(diff/60000)}m`;
    if (diff > 0 && diff < 86400000) return `today ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
    return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }

  function renderDrawerReminders(pending) {
    const body = document.getElementById('rem-drawer-body');
    const countEl = document.getElementById('drawer-remind-count');
    body.innerHTML = '';
    countEl.textContent = pending.length ? `(${pending.length})` : '';

    if (!pending.length) {
      const empty = document.createElement('div');
      empty.className = 'drawer-empty';
      empty.textContent = 'no pending reminders';
      body.appendChild(empty);
      return;
    }

    for (const r of pending) {
      const item = document.createElement('div');
      item.className = 'dr-remind-item';
      const text = document.createElement('div');
      text.className = 'dr-remind-text';
      text.textContent = r.text;
      const meta = document.createElement('div');
      meta.className = 'dr-remind-meta';
      meta.textContent = formatReminderTime(r.trigger_at) + (r.recurring ? ` · ${r.recurring}` : '');
      item.appendChild(text);
      item.appendChild(meta);
      body.appendChild(item);
    }
  }

  function renderReminderList(containerId, items, isDone) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'remind-empty';
      empty.textContent = isDone ? 'no completed reminders' : 'no pending reminders';
      el.appendChild(empty);
      return;
    }
    for (const r of items) {
      const item = document.createElement('div');
      item.className = 'remind-item' + (isDone ? ' done' : '');

      const textSpan = document.createElement('span');
      textSpan.className = 'remind-item-text';
      textSpan.textContent = r.text;

      const timeSpan = document.createElement('span');
      timeSpan.className = 'remind-item-time';
      timeSpan.textContent = formatReminderTime(r.trigger_at);

      item.appendChild(textSpan);
      item.appendChild(timeSpan);

      if (r.recurring) {
        const recur = document.createElement('span');
        recur.className = 'remind-item-recur';
        recur.textContent = r.recurring;
        item.appendChild(recur);
      }

      if (!isDone) {
        const doneBtn = document.createElement('button');
        doneBtn.className = 'btn-done';
        doneBtn.textContent = 'done';
        doneBtn.addEventListener('click', async () => {
          await fetch(`/reminders/${r.id}/done`, { method: 'PATCH' });
          loadReminders();
        });
        item.appendChild(doneBtn);
      }

      el.appendChild(item);
    }
  }

  document.getElementById('btn-add-remind').addEventListener('click', async () => {
    const text  = document.getElementById('remind-text').value.trim();
    const atRaw = document.getElementById('remind-at').value;
    const recur = document.getElementById('remind-recur').value || null;
    if (!text || !atRaw) return;
    const trigger_at = new Date(atRaw).toISOString();
    await fetch('/remind', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, trigger_at, recurring: recur }),
    });
    document.getElementById('remind-text').value = '';
    document.getElementById('remind-at').value = '';
    document.getElementById('remind-recur').value = '';
    loadReminders();
  });

  document.getElementById('show-completed-btn').addEventListener('click', () => {
    const sec = document.getElementById('completed-section');
    const btn = document.getElementById('show-completed-btn');
    const hidden = sec.style.display === 'none';
    sec.style.display = hidden ? 'block' : 'none';
    btn.textContent = hidden ? 'hide completed' : 'show completed';
  });


  // ── Briefing banner ──
  async function loadBriefing() {
    try {
      const res = await fetch('/briefing/today');
      if (!res.ok) return;
      const data = await res.json();
      if (!data.briefing) return;
      const banner = document.getElementById('briefing-banner');
      const body   = document.getElementById('briefing-body');
      // Strip the leading ## date heading — now shown as the card title
      const content = data.briefing.content.replace(/^##[^\n]*\n/, '').trimStart();
      body.innerHTML = marked.parse(content);
      banner.style.display = 'flex';
      banner.style.flexDirection = 'column';
      // Set card title to the briefing date
      const d = new Date(data.briefing.date + 'T00:00:00');
      document.getElementById('briefing-date-title').textContent =
        d.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
    } catch (e) { /* silently ignore */ }
  }

  // ── Collapse/expand all drawer cards ──
  document.querySelectorAll('.btn-collapse').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const collapsed = target.style.display === 'none';
      target.style.display = collapsed ? '' : 'none';
      btn.innerHTML = collapsed ? '&#9662;' : '&#9656;';
      // Shrink the parent section to header-only when collapsed
      const section = btn.closest('.drawer-section');
      if (section) section.style.flex = collapsed ? '' : '0 0 auto';
    });
  });

  // ── Calendar ──
  function formatEventDate(iso) {
    if (!iso) return '';
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const evDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dayLabel = evDay.getTime() === today.getTime() ? 'today'
                   : evDay.getTime() === tomorrow.getTime() ? 'tomorrow'
                   : d.toLocaleDateString([], {month:'short', day:'numeric'});
    const hasTime = iso.length > 10;
    return hasTime
      ? `${dayLabel} ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`
      : dayLabel;
  }

  // ── Calendar multi-view state ──
  const calState = { view: 'month', offset: 0, events: [], meta: {} };

  const HOUR_H = 44;       // px per hour in week grid
  const H_START = 5;       // 5 am
  const H_END = 22;        // 10 pm
  const MONTHS_LONG = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
  const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAYS_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function evColor(ev) {
    return ev.color || (ev.source === 'google' ? '#4285f4' : '#b16286');
  }

  function fmt12(d) {
    return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', hour12:true}).toLowerCase();
  }

  function localDateStr(d) {
    // YYYY-MM-DD in local time
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function evStartDate(ev) {
    return ev.start.length === 10 ? ev.start : localDateStr(new Date(ev.start));
  }

  function weekMonday(base, weekOffset) {
    const d = new Date(base);
    const dow = d.getDay();
    d.setDate(d.getDate() + (dow === 0 ? -6 : 1 - dow) + weekOffset * 7);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  // ── Mini drawer ──
  function renderCalendarMini(events) {
    const el = document.getElementById('cal-events-mini');
    el.innerHTML = '';
    const now = new Date();
    const upcoming = events.filter(ev => new Date(ev.start.length===10 ? ev.start+'T23:59:59' : ev.start) >= now).slice(0, 4);
    if (!upcoming.length) {
      const empty = document.createElement('div');
      empty.className = 'drawer-empty';
      empty.textContent = 'no upcoming events';
      el.appendChild(empty);
      return;
    }
    for (const ev of upcoming) {
      const color = evColor(ev);
      const item = document.createElement('div');
      item.style.cssText = 'font-size:11px; padding:3px 0 3px 6px; border-left:2px solid ' + color + '; margin-bottom:4px;';
      const time = ev.start.length > 10 ? fmt12(new Date(ev.start)) : ev.start.slice(5);
      item.innerHTML = `<span style="color:var(--gb-light);font-weight:700;">${ev.summary}</span>`
        + `<br><span style="color:var(--gb-gray);font-size:10px;">${formatEventDate(ev.start)}</span>`;
      el.appendChild(item);
    }
  }

  // ── Month view ──
  function buildMonthView(events, offset) {
    const now = new Date();
    const viewDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = localDateStr(now);
    const label = `${MONTHS_LONG[month]} ${year}`;

    // Build event map: YYYY-MM-DD -> sorted events
    const evMap = {};
    for (const ev of events) {
      const day = evStartDate(ev);
      if (!evMap[day]) evMap[day] = [];
      evMap[day].push(ev);
    }

    let html = '<div class="month-grid">';
    for (const d of DAYS_SHORT) html += `<div class="month-day-header">${d}</div>`;
    for (let i = 0; i < firstDow; i++) html += '<div class="month-day-cell empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === todayStr;
      const dayEvs = (evMap[dateStr] || []).sort((a,b) => a.start.localeCompare(b.start));
      html += `<div class="month-day-cell${isToday?' today':''}">`;
      html += `<span class="month-date-num${isToday?' today':''}">${d}</span>`;
      for (const ev of dayEvs.slice(0, 3)) {
        const c = evColor(ev);
        const time = ev.start.length > 10 ? fmt12(new Date(ev.start)) : '';
        html += `<div class="month-event" style="background:${c}22;border-left:2px solid ${c};">`;
        if (time) html += `<span class="month-event-time">${time}</span>`;
        html += `<span class="month-event-title">${ev.summary}</span></div>`;
      }
      if (dayEvs.length > 3) html += `<div class="month-more">+${dayEvs.length - 3} more</div>`;
      html += '</div>';
    }
    html += '</div>';
    return { html, label };
  }

  // ── Week view ──
  function buildWeekView(events, offset) {
    const now = new Date();
    const mon = weekMonday(now, offset);
    const weekDays = Array.from({length:7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
    const todayStr = localDateStr(now);
    const totalH = (H_END - H_START) * HOUR_H;

    const label = `${weekDays[0].toLocaleDateString([],{month:'short',day:'numeric'})} – `
      + weekDays[6].toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});

    // Group events by weekday index
    const dayEvs = [[],[],[],[],[],[],[]];
    for (const ev of events) {
      const ds = evStartDate(ev);
      for (let i = 0; i < 7; i++) {
        if (localDateStr(weekDays[i]) === ds) { dayEvs[i].push(ev); break; }
      }
    }

    const container = document.createElement('div');
    container.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;';

    // Header
    const header = document.createElement('div');
    header.className = 'week-header-row';
    header.innerHTML = '<div class="week-time-pad"></div><div class="week-day-headers">'
      + weekDays.map((d,i) => {
          const ds = localDateStr(d);
          const isToday = ds === todayStr;
          return `<div class="week-day-hdr${isToday?' today':''}">${DAYS_SHORT[d.getDay()]} ${d.getDate()}</div>`;
        }).join('')
      + '</div>';
    container.appendChild(header);

    const scroll = document.createElement('div');
    scroll.className = 'week-grid-scroll';
    const inner = document.createElement('div');
    inner.className = 'week-grid-inner';

    // Time gutter
    const gutter = document.createElement('div');
    gutter.className = 'week-time-gutter';
    for (let h = H_START; h < H_END; h++) {
      const lbl = document.createElement('div');
      lbl.className = 'week-hour-label';
      lbl.textContent = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
      gutter.appendChild(lbl);
    }
    inner.appendChild(gutter);

    // Day columns
    const colsWrap = document.createElement('div');
    colsWrap.className = 'week-day-cols';

    for (let i = 0; i < 7; i++) {
      const col = document.createElement('div');
      col.className = 'week-day-col';
      col.style.minHeight = totalH + 'px';

      for (let h = 0; h < H_END - H_START; h++) {
        const line = document.createElement('div');
        line.className = 'week-hour-line';
        line.style.top = (h * HOUR_H) + 'px';
        col.appendChild(line);
      }

      // "now" indicator
      if (localDateStr(weekDays[i]) === todayStr) {
        const nowMins = now.getHours() * 60 + now.getMinutes();
        const nowTop = (nowMins / 60 - H_START) * HOUR_H;
        if (nowTop >= 0 && nowTop <= totalH) {
          const nl = document.createElement('div');
          nl.className = 'now-line';
          nl.style.top = nowTop + 'px';
          col.appendChild(nl);
        }
      }

      for (const ev of dayEvs[i]) {
        const isAllDay = ev.start.length === 10;
        const evStart = new Date(isAllDay ? ev.start + 'T00:00:00' : ev.start);
        const evEnd   = new Date(isAllDay ? ev.end   + 'T23:59:59' : ev.end);
        const startMins = evStart.getHours() * 60 + evStart.getMinutes();
        const endMins   = Math.max(startMins + 15, evEnd.getHours() * 60 + evEnd.getMinutes());
        const topPx    = Math.max(0, (startMins / 60 - H_START) * HOUR_H);
        const heightPx = Math.max(18, (endMins - startMins) / 60 * HOUR_H);
        const color = evColor(ev);
        const evEl = document.createElement('div');
        evEl.className = 'week-event';
        evEl.style.cssText = `top:${topPx}px;height:${heightPx}px;background:${color}28;border-left:2px solid ${color};`;
        evEl.innerHTML = `<span class="week-event-time">${isAllDay ? 'all day' : fmt12(evStart)}</span>`
          + `<span class="week-event-title">${ev.summary}</span>`;
        col.appendChild(evEl);
      }
      colsWrap.appendChild(col);
    }

    inner.appendChild(colsWrap);
    scroll.appendChild(inner);
    container.appendChild(scroll);

    // Scroll to current time on load
    requestAnimationFrame(() => {
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const nowTop = (nowMins / 60 - H_START) * HOUR_H;
      scroll.scrollTop = Math.max(0, nowTop - 100);
    });

    return { el: container, label };
  }

  // ── Day view ──
  function buildDayView(events, offset) {
    const now = new Date();
    const viewDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + offset);
    const viewDateStr = localDateStr(viewDate);
    const label = `${DAYS_LONG[viewDate.getDay()]}, ${MONTHS_LONG[viewDate.getMonth()]} ${viewDate.getDate()} ${viewDate.getFullYear()}`;
    const dayEvs = events.filter(ev => evStartDate(ev) === viewDateStr)
                         .sort((a,b) => a.start.localeCompare(b.start));
    if (!dayEvs.length) {
      return { html: '<div style="padding:24px 16px;color:var(--gb-gray);font-size:12px;">No events this day.</div>', label };
    }
    let html = '<div class="day-view" style="overflow-y:auto;flex:1;">';
    for (const ev of dayEvs) {
      const color = evColor(ev);
      const isAllDay = ev.start.length === 10;
      const evStart = new Date(isAllDay ? ev.start + 'T00:00:00' : ev.start);
      const evEnd   = new Date(isAllDay ? ev.end   + 'T00:00:00' : ev.end);
      const timeStr = isAllDay ? 'all day' : `${fmt12(evStart)} – ${fmt12(evEnd)}`;
      html += `<div class="day-event-row">
        <div class="day-event-time">${timeStr}</div>
        <div class="day-event-dot" style="background:${color};"></div>
        <div>
          <div class="day-event-title">${ev.summary}</div>
          ${ev.description ? `<div class="day-event-desc">${ev.description}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
    return { html, label };
  }

  // ── Render active view into #cal-view-area ──
  function renderCalViewArea() {
    const area = document.getElementById('cal-view-area');
    const label = document.getElementById('cal-period-label');
    if (!area) return;
    const { view, offset, events } = calState;
    if (view === 'month') {
      const r = buildMonthView(events, offset);
      area.innerHTML = r.html;
      label.textContent = r.label;
    } else if (view === 'week') {
      const r = buildWeekView(events, offset);
      area.innerHTML = '';
      area.appendChild(r.el);
      label.textContent = r.label;
    } else {
      const r = buildDayView(events, offset);
      area.innerHTML = r.html;
      label.textContent = r.label;
    }
    // Auth banner
    const authEl = document.getElementById('cal-modal-auth');
    const meta = calState.meta;
    if (meta && !meta.gcal_authorized && meta.gcal_credentials) {
      authEl.style.display = 'block';
    } else if (meta && !meta.gcal_authorized && !meta.gcal_credentials) {
      authEl.style.display = 'block';
      const link = document.getElementById('cal-auth-link');
      link.textContent = 'Google Calendar: credentials.json missing';
      link.removeAttribute('href');
      link.style.color = 'var(--gb-orange)';
    } else {
      authEl.style.display = 'none';
    }
  }

  // ── View tab switching ──
  document.querySelectorAll('.cal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      calState.view = tab.dataset.view;
      calState.offset = 0;
      document.querySelectorAll('.cal-tab').forEach(t => t.classList.toggle('active', t.dataset.view === calState.view));
      renderCalViewArea();
    });
  });
  document.getElementById('cal-prev').addEventListener('click', () => { calState.offset--; renderCalViewArea(); });
  document.getElementById('cal-next').addEventListener('click', () => { calState.offset++; renderCalViewArea(); });
  document.getElementById('cal-today-btn').addEventListener('click', () => { calState.offset = 0; renderCalViewArea(); });

  async function loadCalendar() {
    try {
      const res = await fetch('/calendar');
      if (!res.ok) return;
      const data = await res.json();
      calState.events = data.events || [];
      calState.meta = data;
      renderCalendarMini(calState.events);
      renderCalViewArea();
    } catch { /* silently ignore */ }
  }

  // ── Init ──
  loadReminders();
  loadConversations();
  loadCalendar();
  loadBriefing();
  input.focus();
</script>
</body>
</html>
