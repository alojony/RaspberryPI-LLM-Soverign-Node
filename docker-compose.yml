services:

  # ── LLM Runtime (llama.cpp server) ──────────────────────────
  llm:
    build: ./services/llm
    container_name: pi-llm
    restart: unless-stopped
    volumes:
      - ./data/models:/data/models:ro
    environment:
      - LLAMA_ARG_MODEL=${MODEL_PATH}
      - LLAMA_ARG_CTX_SIZE=${LLM_CTX:-2048}
      - LLAMA_ARG_N_THREADS=${LLM_THREADS:-4}
      - LLAMA_ARG_BATCH_SIZE=${LLM_BATCH:-512}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Embedding Service ────────────────────────────────────────
  embeddings:
    build: ./services/embeddings
    container_name: pi-embeddings
    restart: unless-stopped
    environment:
      - EMBED_MODEL=${EMBED_MODEL:-all-MiniLM-L6-v2}
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Vector DB (Qdrant) ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pi-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q 200'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── FastAPI Application ──────────────────────────────────────
  api:
    build: ./services/api
    container_name: pi-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/db:/data/db
      - ${VAULT_HOST_PATH:-./data/vault}:/data/vault:ro
      - ./services/api/ui:/app/ui:ro
    # WM8960 HAT audio — uncomment on Pi after dtoverlay=wm8960-soundcard is set in /boot/firmware/config.txt
    # devices:
    #   - /dev/snd:/dev/snd
    # group_add:
    #   - audio
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      llm:
        condition: service_started
      embeddings:
        condition: service_started
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
